# sylva-cuda â€” the Phase 1 toolchain-spike crate. In Phase 4+ this becomes the
# CudaBackend; for now it only proves the cudarc + NVRTC + PyO3 path links.
[package]
name = "sylva-cuda"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
authors.workspace = true
repository.workspace = true
description = "GPU-native forest-ensemble CUDA backend (Phase 1 toolchain spike)."

[lib]
# cdylib  -> the Python extension module (.pyd) that maturin packages.
# rlib    -> lets Rust integration tests / future crates link against this crate.
crate-type = ["cdylib", "rlib"]

# Fairness-encoded launch/throughput microbench (SC-6). `harness = false` -> a
# plain `fn main()` (no libtest/criterion); it runs full timing by default and a
# fast correctness-only path under `-- --test` (the plan's verify gate). Uses the
# default `cuda-static` feature like `cargo test`.
[[bench]]
name = "microbench"
harness = false

[dependencies]
# Launch-proof feature set (D-02 / D-03): driver + nvrtc + STATIC link against
# the installed CUDA 12.8 toolkit (cuda-12080). default-features = false is
# REQUIRED to drop cublas/cublaslt/curand/runtime â€” none are needed in Phase 1
# (Philox is hand-rolled later; no GEMM in the hot path). See 01-RESEARCH.md
# Pitfall 3.
#
# `dynamic-linking` is the mandatory link-MODE selector for the build-time
# launch proof: cudarc 0.19.8's build.rs panics unless exactly one of
# {dynamic-loading, fallback-dynamic-loading, dynamic-linking, static-linking}
# is active, and `cuda-12080` only selects the CUDA *version* bindings â€” it is
# NOT a link mode. (01-PLAN.md's `["driver","nvrtc","cuda-12080"]` omitted the
# mode and would panic; see 01-01-SUMMARY.md "Deviations".)
#
# Why `dynamic-linking` and not `static-linking`: on native Windows/MSVC,
# cudarc's `static-linking` requires the GNU/Clang static lib `stdc++` (errors
# `could not find native static library stdc++`), which does not exist in the
# MSVC toolchain. `dynamic-linking` links against the installed CUDA 12.8
# toolkit's import libraries at build time â€” which IS D-02's intent ("link
# against the installed CUDA 12.8 toolkit" for the launch proof), and is
# distinct from the wheel's runtime `dynamic-loading`.
#
# NOTE: the SHIPPING wheel build (Plan 03, D-02) swaps these features to
# ["driver", "nvrtc", "dynamic-loading"] so CUDA is resolved at runtime via the
# driver (one wheel for any compatible CUDA). The committed default stays the
# toolkit-linked launch-proof set below.
# `std` is a pure marker feature (`std = []` in cudarc 0.19.8 â€” NO extra deps,
# does NOT pull cublas/curand/runtime, so Pitfall 3 / D-03 stay honoured). It is
# REQUIRED here because cudarc gates `impl std::error::Error for DriverError`
# (and `CompileError`) behind `#[cfg(feature = "std")]`; `default-features =
# false` drops it, which makes thiserror's `#[from]` fail to find the `Error`
# impl. Adding `std` restores the std error trait so our typed `CudaError` can
# wrap cudarc errors and every device call propagates via `?` (no silent
# fallback).
# cudarc's link MODE is selected via a Cargo feature TOGGLE (Plan 03), because the
# two D-02 link modes are mutually exclusive but both must be provably exercised:
#   - `cuda-static`  (default) -> ["cuda-12080", "dynamic-linking"]: the Plan 01/02
#     launch proof; links against the installed CUDA 12.8 toolkit at build time.
#   - `wheel`                  -> ["dynamic-loading"]: the SHIPPING abi3 wheel
#     (D-02); CUDA is resolved at RUNTIME via the driver -> one wheel for any
#     compatible CUDA. Built with `--no-default-features --features wheel`.
# Only `driver`, `nvrtc`, `std` are unconditional here; the link-mode features are
# added by the toggle below. `default-features = false` stays REQUIRED to drop
# cublas/cublaslt/curand/runtime (Pitfall 3 / D-03). `std` is a pure marker
# feature (`std = []` in cudarc 0.19.8 â€” NO extra deps) needed because cudarc gates
# `impl std::error::Error for DriverError`/`CompileError` behind `#[cfg(feature =
# "std")]`; without it thiserror's `#[from]` cannot find the `Error` impl.
cudarc = { version = "0.19.8", default-features = false, features = ["std", "driver", "nvrtc"] }

# PyO3 abi3 (stable ABI): one cp310-abi3 wheel runs on any CPython >= 3.10
# (covers the local Python 3.14.3). extension-module is the .pyd build mode.
pyo3 = { version = "0.29.0", features = ["extension-module", "abi3-py310"] }

# Typed library error enum (CLAUDE.md-pinned). Maps cudarc DriverError /
# CompileError into a single crate error so every device call propagates a
# Result via `?` (no `.unwrap()`/`.expect()` on device calls â€” no silent
# fallback). Version inherited from the workspace.
thiserror = { workspace = true }

[features]
# D-02 link-mode toggle. EXACTLY one of these governs how cudarc links CUDA; the
# two modes are mutually exclusive (cudarc 0.19.8's build.rs panics unless exactly
# one of {dynamic-loading, dynamic-linking, static-linking, fallback-dynamic-
# loading} is active), so they cannot both be in the dependency line at once.
default = ["cuda-static"]

# Launch proof (Plan 01/02): static toolkit link against the installed CUDA 12.8.
# `cargo build` / `cargo test` use this by default â€” keeps Plans 01/02 green.
cuda-static = ["cudarc/cuda-12080", "cudarc/dynamic-linking"]

# Shipping wheel (Plan 03 / D-02): runtime CUDA resolution via the driver. Built
# with `maturin build --release --no-default-features --features wheel` so the
# cp310-abi3-win_amd64 wheel resolves CUDA at load time, not at build time.
# `cuda-12080` is the CUDA *version* selector (chooses the binding ABI) and is
# required in BOTH modes â€” cudarc's build.rs panics without a cuda-1xxxx feature
# even under `dynamic-loading` (the version selector is orthogonal to the link
# mode). `dynamic-loading` is the link MODE that defers symbol resolution to the
# driver at runtime, which is what makes the wheel portable across CUDA installs.
wheel = ["cudarc/cuda-12080", "cudarc/dynamic-loading"]
